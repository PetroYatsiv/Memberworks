@if (auth.isAuthenticated()) {
  <mat-toolbar color="primary">
    <mat-icon>groups</mat-icon>
    <span style="font-weight: 600; margin: 0 1.5rem 0 0.5rem;">MemberWorks</span>

    <a mat-button class="toolbar-link" routerLink="/households" routerLinkActive="active">Households</a>
    <a mat-button class="toolbar-link" routerLink="/users" routerLinkActive="active">Users</a>
    <a mat-button class="toolbar-link" routerLink="/organization" routerLinkActive="active">Organization</a>

    <span class="spacer"></span>

    <span class="who">
      {{ auth.user()?.firstName }} · {{ auth.user()?.role }} · {{ auth.user()?.organizationName }}
    </span>
    <button mat-stroked-button (click)="logout()">
      <mat-icon>logout</mat-icon>
      Log out
    </button>
  </mat-toolbar>
}

<main class="content">
  <router-outlet />
</main>
