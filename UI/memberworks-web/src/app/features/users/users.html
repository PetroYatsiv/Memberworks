<h1>Users</h1>

@if (auth.isAdmin()) {
  <mat-card class="page-card">
    <mat-card-header><mat-card-title>Add a user</mat-card-title></mat-card-header>
    <mat-card-content>
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>First name</mat-label>
          <input matInput [(ngModel)]="form.firstName" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Last name</mat-label>
          <input matInput [(ngModel)]="form.lastName" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="form.email" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Role</mat-label>
          <mat-select [(ngModel)]="form.role">
            <mat-option value="Member">Member</mat-option>
            <mat-option value="OrgAdmin">OrgAdmin</mat-option>
          </mat-select>
        </mat-form-field>
        <button mat-flat-button color="primary"
                (click)="create()" [disabled]="saving() || !form.email || !form.firstName">
          Add user
        </button>
      </div>
      @if (error()) { <p class="error">{{ error() }}</p> }
    </mat-card-content>
  </mat-card>
}

<mat-card class="page-card">
  <mat-card-content>
    <table mat-table [dataSource]="users()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let u">{{ u.firstName }} {{ u.lastName }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let u"><mat-chip>{{ u.role }}</mat-chip></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
    @if (!users().length) { <p class="muted">No users yet.</p> }
  </mat-card-content>
</mat-card>
